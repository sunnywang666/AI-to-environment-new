<!doctype html>
<html lang="zh"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>水的去向 — 滚动驱动桑基粒子流</title>
<style>
  :root{--ink:#0a1014;--water:#5fb6cf;--ember:#c0432a;--steam:#dce9ed;--power:#c79a3a;--leaf:#8a9a5e;--dim:#8a969c;}
  html,body{margin:0;background:#0a1014;color:#e7eef0;font-family:"Noto Sans SC","Microsoft YaHei",sans-serif;line-height:1.85;}
  #track{height:480vh;position:relative;}
  #stage{position:sticky;top:0;height:100vh;overflow:hidden;}
  canvas{position:absolute;inset:0;width:100%;height:100%;}
  #cap{position:absolute;left:50%;bottom:10vh;transform:translateX(-50%);text-align:center;max-width:620px;padding:0 24px;z-index:2;pointer-events:none;}
  #cap-k{font-size:12px;letter-spacing:.3em;color:var(--dim);margin-bottom:10px;}
  #cap-t{font-size:clamp(17px,2.3vw,24px);font-weight:700;line-height:1.5;text-shadow:0 2px 22px rgba(0,0,0,.75);transition:opacity .3s;}
  #cap-t b{font-weight:900;} .w{color:var(--water)} .e{color:#e0664a} .s{color:var(--steam)}
  #hint{position:absolute;left:50%;bottom:3vh;transform:translateX(-50%);z-index:3;font-size:12px;letter-spacing:.16em;color:var(--dim);animation:bob 2s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(5px)}}
  #note{position:fixed;right:10px;bottom:8px;color:var(--water);opacity:.7;font:10px ui-monospace,monospace;background:rgba(10,16,20,.6);padding:2px 7px;border-radius:4px;}
</style></head><body>
<div id="track"><div id="stage">
  <canvas id="c"></canvas>
  <div id="cap"><div id="cap-k">③ 用完之后</div><div id="cap-t">干净的淡水，从河里被抽进机房。</div></div>
  <div id="hint">↓ 滚动，跟着这股水走 ↓</div>
</div></div>
<div id="note">滚动驱动 · 桑基带宽=比例 · 粒子流 + 雾/废水质感 · 真渲染</div>
<script>
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
const capK=document.getElementById('cap-k'), capT=document.getElementById('cap-t');
let DPR=Math.min(devicePixelRatio||1,2), P=0, W=0, Hh=0, U=0;
function resize(){ W=innerWidth; Hh=innerHeight; U=Math.min(W,Hh); cv.width=W*DPR; cv.height=Hh*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); }
resize(); addEventListener('resize',resize);
addEventListener('scroll',()=>{ const t=document.getElementById('track'); P=Math.min(1,Math.max(0,scrollY/(t.scrollHeight-innerHeight))); },{passive:true});
const cl=(v,a=0,b=1)=>v<a?a:v>b?b:v, sm=t=>t*t*(3-2*t), lerp=(a,b,t)=>a+(b-a)*t;
let T=0;

// ---- 像素节点（frame 内按当前尺寸取） ----
function nodes(){
  return {
    intake:{x:W*0.10, y:Hh*0.52},
    cIn:   {x:W*0.34, y:Hh*0.50},      // 机房进水口
    cOut:  {x:W*0.46, y:Hh*0.50},      // 机房出水口
    evap:  {x:W*0.92, y:Hh*0.16},
    waste: {x:W*0.92, y:Hh*0.84},
    power: {x:W*0.10, y:Hh*0.86},
  };
}
// 二次贝塞尔 + 切线/法线（像素空间）
const bez=(p0,p1,p2,t)=>{const u=1-t;return{x:u*u*p0.x+2*u*t*p1.x+t*t*p2.x,y:u*u*p0.y+2*u*t*p1.y+t*t*p2.y};};
function nrm(fn,t){const a=fn(Math.max(0,t-0.008)),b=fn(Math.min(1,t+0.008));let dx=b.x-a.x,dy=b.y-a.y,l=Math.hypot(dx,dy)||1;return{x:-dy/l,y:dx/l};}
function paths(){const n=nodes();return{
  inflow:t=>bez(n.intake,{x:W*0.22,y:Hh*0.52},n.cIn,t),
  evap:  t=>bez(n.cOut,{x:W*0.66,y:Hh*0.30},n.evap,t),
  waste: t=>bez(n.cOut,{x:W*0.66,y:Hh*0.72},n.waste,t),
  power: t=>bez(n.power,{x:W*0.22,y:Hh*0.86},n.cIn,t),
};}
// 桑基带：沿中心路径用半宽填充
function ribbon(fn,hw0,hw1,grad){
  const top=[],bot=[];
  for(let i=0;i<=40;i++){const t=i/40,p=fn(t),nm=nrm(fn,t),hw=lerp(hw0,hw1,t);
    top.push({x:p.x+nm.x*hw,y:p.y+nm.y*hw}); bot.push({x:p.x-nm.x*hw,y:p.y-nm.y*hw});}
  ctx.beginPath(); ctx.moveTo(top[0].x,top[0].y);
  for(const q of top)ctx.lineTo(q.x,q.y); for(let i=bot.length-1;i>=0;i--)ctx.lineTo(bot[i].x,bot[i].y);
  ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
}

// ---- 粒子 ----
const ps=[];
function spawn(kind){ ps.push({kind, seg:kind==='power'?'power':'in', t:0, lat:(Math.random()*2-1),
  spd:0.005+Math.random()*0.004, life:1, sz:1.8+Math.random()*1.2, vx:0, vy:0, x:0,y:0}); }

const caps=[
  {p:0,    k:"③ 用完之后", t:"干净的淡水，从河里被抽进机房。"},
  {p:0.22, k:"水扛热",     t:"水给<b class='w'>烧电的芯片</b>降温，自己被烧得滚烫。"},
  {p:0.46, k:"水分两条路 · 带宽=比例", t:"<b class='s'>七到八成</b>蒸发升空——这股最粗；只有<b class='e'>两到三成</b>变成毒水沉下去。"},
  {p:0.72, k:"绕成一个圈", t:"升空的水多半在别处降雨，<b>不回本地</b>；排碳又加剧干旱——下一座机房要喝的水更紧。"},
];
let lastCap=-1;
function setCap(){let i=0;caps.forEach((c,k)=>{if(P>=c.p)i=k;});if(i!==lastCap){lastCap=i;capT.style.opacity=0;
  setTimeout(()=>{capK.textContent=caps[i].k;capT.innerHTML=caps[i].t;capT.style.opacity=1;},150);}}

// 机房：散热鳍片 + 热浪
function datacenter(n,heat){
  const w=W*0.12, h=Hh*0.26, x=n.cIn.x, y=n.cIn.y-h/2;
  // 盒体
  ctx.fillStyle=`rgb(${18+heat*150|0},${26+heat*22|0},${32+heat*8|0})`;
  ctx.strokeStyle="rgba(150,180,190,.5)"; ctx.lineWidth=1.5;
  ctx.fillRect(x,y,w,h); ctx.strokeRect(x,y,w,h);
  // 竖直散热鳍片
  const fins=9;
  for(let i=0;i<fins;i++){const fx=x+w*(i+.5)/fins;
    ctx.strokeStyle=`rgba(${120+heat*135|0},${160-heat*60|0},${175-heat*90|0},.55)`; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(fx,y+5); ctx.lineTo(fx,y+h-5); ctx.stroke();}
  // 顶部热浪
  if(heat>.15){ for(let k=0;k<6;k++){const hx=x+w*(k+.5)/6;
    ctx.strokeStyle=`rgba(${220},${110},${60},${0.12*heat})`; ctx.lineWidth=3;
    ctx.beginPath(); for(let yy=0;yy<h*0.7;yy+=4){const px=hx+Math.sin(yy*0.06+T*0.06+k)*6*heat; (yy===0?ctx.moveTo(px,y-2):ctx.lineTo(px,y-2-yy));} ctx.stroke();}}
  ctx.fillStyle="#fff"; ctx.font="700 13px 'Noto Sans SC'"; ctx.textAlign="center";
  ctx.fillText("数据中心",x+w/2,y-12);
  ctx.fillStyle="rgba(231,238,240,.6)"; ctx.font="11px 'Noto Sans SC'"; ctx.fillText("芯片烧电·水扛热",x+w/2,y+h+18);
  return {x,y,w,h};
}

function frame(){
  requestAnimationFrame(frame); T++;
  ctx.clearRect(0,0,W,Hh);
  const n=nodes(), pa=paths();
  const rIn=sm(cl(P/0.18)), rHeat=sm(cl((P-0.18)/0.2)), rSplit=sm(cl((P-0.44)/0.22)), rLoop=sm(cl((P-0.7)/0.2));
  const HWm=U*0.045; // 主带半宽

  // ---- 桑基带（半透明，按阶段淡入）----
  if(rIn>0){ const g=ctx.createLinearGradient(n.intake.x,0,n.cIn.x,0); g.addColorStop(0,`rgba(95,182,207,${0.10*rIn})`); g.addColorStop(1,`rgba(95,182,207,${0.22*rIn})`);
    ribbon(pa.inflow, HWm*0.7, HWm, g); }
  if(rHeat>0){ ribbon(pa.power, U*0.012, U*0.02, `rgba(199,154,58,${0.16*rHeat})`); }
  if(rSplit>0){ // 蒸发带粗(0.76)、废水带细(0.24)：带宽=比例
    ribbon(pa.evap,  HWm, HWm*0.76, `rgba(207,230,236,${0.16*rSplit})`);
    ribbon(pa.waste, HWm, HWm*0.24, `rgba(192,67,42,${0.20*rSplit})`); }

  // ---- 闭环回流线 ----
  if(rLoop>0){ ctx.strokeStyle=`rgba(138,154,94,${0.5*rLoop})`; ctx.lineWidth=1.5; ctx.setLineDash([2,8]);
    ctx.beginPath(); ctx.moveTo(n.evap.x,n.evap.y-U*0.04);
    ctx.bezierCurveTo(W*0.5,-Hh*0.06,W*0.0,Hh*0.05,n.intake.x,n.intake.y-U*0.05); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle=`rgba(138,154,94,${rLoop})`; ctx.font="12px 'Noto Sans SC'"; ctx.textAlign="center";
    ctx.fillText("蒸发的水 → 别处降雨 · 本地净损失 → 下一口水更紧", W*0.5, Hh*0.06); }

  // ---- 机房 ----
  const box=datacenter(n, rHeat);

  // ---- 节点标注 ----
  ctx.textAlign="center";
  ctx.fillStyle=`rgba(95,182,207,${0.5+0.5*rIn})`; ctx.beginPath(); ctx.arc(n.intake.x,n.intake.y,5,0,7); ctx.fill();
  ctx.fillStyle="rgba(231,238,240,.9)"; ctx.font="700 14px 'Noto Sans SC'"; ctx.fillText("取水口",n.intake.x,n.intake.y-14);
  ctx.fillStyle=`rgba(95,182,207,${0.4+0.5*rIn})`; ctx.font="12px 'Noto Sans SC'"; ctx.fillText("河 / 地下水",n.intake.x,n.intake.y+24);
  if(rHeat>.1){ ctx.fillStyle=`rgba(199,154,58,${rHeat})`; ctx.font="700 13px 'Noto Sans SC'"; ctx.fillText("电厂",n.power.x,n.power.y+5);
    ctx.font="11px 'Noto Sans SC'"; ctx.fillText("煤 / 气",n.power.x,n.power.y+22);}
  if(rSplit>.1){
    ctx.fillStyle=`rgba(220,233,237,${rSplit})`; ctx.font="700 15px 'Noto Sans SC'"; ctx.fillText("蒸发 70–80%",n.evap.x,n.evap.y-16);
    ctx.font="12px 'Noto Sans SC'"; ctx.fillStyle=`rgba(180,200,206,${rSplit})`; ctx.fillText("升空·别处降雨",n.evap.x,n.evap.y+18);
    ctx.fillStyle=`rgba(224,102,74,${rSplit})`; ctx.font="700 15px 'Noto Sans SC'"; ctx.fillText("废水 20–30%",n.waste.x,n.waste.y+20);
    ctx.font="12px 'Noto Sans SC'"; ctx.fillText("化学毒水·回不去",n.waste.x,n.waste.y+38);
  }

  // ---- 废水池（沉着的一摊，持续波动）----
  if(rSplit>.2){ const px=n.waste.x, py=n.waste.y-U*0.005, pw=U*0.13, ph=U*0.03;
    ctx.fillStyle=`rgba(150,40,28,${0.5*rSplit})`; ctx.beginPath(); ctx.ellipse(px,py+ph*0.6,pw*0.5,ph,0,0,7); ctx.fill(); }

  // ---- 生成粒子 ----
  if(rIn>.1 && T%2===0) spawn('water');
  if(rHeat>.2 && T%6===0) spawn('power');

  // ---- 更新+画 ----
  for(let i=ps.length-1;i>=0;i--){ const p=ps[i];
    if(p.seg==='mist'){ p.x+=p.vx; p.y+=p.vy; p.vy-=0.004; p.vx*=0.99; p.life-=0.012; p.sz+=0.06;
      if(p.life<=0){ps.splice(i,1);continue;}
      ctx.fillStyle=`rgba(220,233,237,${cl(p.life)*0.5})`; ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,7); ctx.fill(); continue; }
    p.t+=p.spd*(0.6+0.7*rIn);
    let fn, col, hw=HWm;
    if(p.seg==='power'){ fn=pa.power; hw=U*0.016; const pos=fn(cl(p.t)),nm=nrm(fn,cl(p.t));
      const x=pos.x+nm.x*p.lat*hw, y=pos.y+nm.y*p.lat*hw;
      if(p.t>=1){ps.splice(i,1);continue;}
      ctx.fillStyle=`rgba(199,154,58,${p.life})`; ctx.beginPath(); ctx.arc(x,y,1.8,0,7); ctx.fill(); continue; }
    if(p.seg==='in'){ fn=pa.inflow; hw=lerp(HWm*0.7,HWm,p.t);
      if(p.t>=1){ if(rSplit<.1){ps.splice(i,1);continue;} p.seg=Math.random()<0.77?'evap':'waste'; p.t=0; continue; }
      const pos=fn(cl(p.t)),nm=nrm(fn,cl(p.t)); const x=pos.x+nm.x*p.lat*hw, y=pos.y+nm.y*p.lat*hw;
      ctx.fillStyle=`rgba(95,182,207,${0.85})`; ctx.beginPath(); ctx.arc(x,y,p.sz,0,7); ctx.fill(); continue; }
    if(p.seg==='evap'){ fn=pa.evap; hw=lerp(HWm,HWm*0.76,p.t); const f=cl(p.t);
      const pos=fn(f),nm=nrm(fn,f); const x=pos.x+nm.x*p.lat*hw, y=pos.y+nm.y*p.lat*hw;
      if(p.t>=0.82){ p.seg='mist'; p.x=x; p.y=y; p.vx=(Math.random()-.5)*0.6; p.vy=-0.8-Math.random()*0.6; continue; }
      // 越往上越淡越白
      ctx.fillStyle=`rgba(${150+f*70|0},${190+f*40|0},${205+f*30|0},${0.8-f*0.3})`;
      ctx.beginPath(); ctx.arc(x,y,p.sz*(1-f*0.2),0,7); ctx.fill(); continue; }
    if(p.seg==='waste'){ fn=pa.waste; hw=lerp(HWm,HWm*0.24,p.t); const f=cl(p.t);
      const pos=fn(f),nm=nrm(fn,f); const x=pos.x+nm.x*p.lat*hw, y=pos.y+nm.y*p.lat*hw;
      if(p.t>=1){ps.splice(i,1);continue;}
      // 越走越暗越大越沉
      ctx.fillStyle=`rgba(${180-f*40|0},${60-f*20|0},${42-f*14|0},${0.9})`;
      ctx.beginPath(); ctx.arc(x,y,p.sz*(1+f*0.8),0,7); ctx.fill(); continue; }
  }
  if(ps.length>900) ps.splice(0,ps.length-900);
  setCap();
}
frame();
</script>
</body></html>
