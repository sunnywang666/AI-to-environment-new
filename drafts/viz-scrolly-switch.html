<!doctype html>
<html lang="zh"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>复现 teenager：单字号黑块 + 高光笔 + 纯位移滑入 + 分阶段时序</title>
<style>
  :root{--bg:#1a2632;--text:#e7eef0;--dim:#7d8a90;--water:#5fb6cf;--ember:#e0664a;--energy:#d2a24a;
    --mono:ui-monospace,"SF Mono","Consolas",monospace;--sans:"Noto Sans SC","Microsoft YaHei",sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:18px;line-height:1.85}
  #stage{height:100vh;overflow:hidden;position:relative}
  canvas{position:absolute;inset:0;width:100%;height:100%}
  /* 复现 teenager 文字块：纯黑实底（与深蓝灰背景区分）· 只一个字号 · weight 400 · 高光笔标重点 */
  .box{position:absolute;left:50%;top:16vh;transform:translateX(-50%);max-width:600px;width:auto;
    background:#000;border-radius:2px;padding:11px 14px;z-index:2;will-change:transform}
  .box p{font-size:18px;font-weight:400;color:#fff;line-height:1.62;margin:0}
  .box p+p{margin-top:.5em}
  /* 高光笔：实色背景 + 紧凑内距，不加粗、不改字色为主题色 */
  /* 高光笔前后留空（你指出的：高亮前后各要一个空） */
  .hl{display:inline-block;padding:0 5px;line-height:1.46;border-radius:1px;font-weight:400;white-space:nowrap;margin:0 .14em;vertical-align:baseline}
  .hl-e{background:var(--ember);color:#fff} .hl-g{background:var(--energy);color:#fff} .hl-w{background:var(--water);color:#fff}
  #hint{position:fixed;left:50%;bottom:3vh;transform:translateX(-50%);z-index:3;font-size:12px;letter-spacing:.16em;color:var(--dim);animation:bob 2s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(5px)}}
  #note{position:fixed;right:10px;bottom:8px;color:var(--water);opacity:.7;font:10px var(--mono);background:rgba(10,15,20,.6);padding:2px 7px;border-radius:4px}
</style></head><body>
<div id="stage">
  <canvas id="c"></canvas>
  <div class="box" id="t1">
    <p>过去十年，西弗吉尼亚州居民电价上涨<span class="hl hl-e">73%</span>。一张电费单，能超过一个人当月的全部收入。</p></div>
  <div class="box" id="t2">
    <p>未来五年美国电力负荷将增加约 166 吉瓦，其中<span class="hl hl-g">90 吉瓦</span>来自数据中心——为它新建的电厂和电网，最终摊到每个人账单上。</p></div>
</div>
<script src="js/vendor/gsap.min.js"></script>
<script src="js/vendor/ScrollTrigger.min.js"></script>
<script>
gsap.registerPlugin(ScrollTrigger);
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
const t1=document.getElementById('t1'), t2=document.getElementById('t2');
let DPR=Math.min(devicePixelRatio||1,2), P=0, W=0, Hh=0;
function resize(){W=innerWidth;Hh=innerHeight;cv.width=W*DPR;cv.height=Hh*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
resize(); addEventListener('resize',resize);
const cl=(v,a=0,b=1)=>v<a?a:v>b?b:v, sm=t=>t*t*(3-2*t), lerp=(a,b,t)=>a+(b-a)*t;
const kf=(p,a,b)=>sm(cl((p-a)/(b-a)));
const GUT=()=>Math.max(54,Math.min(96,W*0.07));
function plot(){const g=GUT();return {l:g+34,r:W-g,t:Hh*0.40,b:Hh*0.86};}   // 图上移一点
ScrollTrigger.create({trigger:"#stage",start:"top top",end:"+=7200",pin:true,scrub:true,onUpdate:s=>P=s.progress});

// ===== 图A：电价发光曲线（第一/二版认可的样式，保持不变）=====
const DATA=[[2016,8.5],[2018,9.3],[2020,10.4],[2022,11.7],[2024,13.2],[2026,14.7]];const Y0=DATA[0][1];
const xA=(yr,p)=>lerp(p.l,p.r,(yr-2016)/10), yA=(c,p)=>lerp(p.b,p.t,(c-7)/(16-7));
function atA(prog){const yr=2016+10*prog;let i=0;while(i<DATA.length-1&&DATA[i+1][0]<yr)i++;
  const[x0,v0]=DATA[i],[x1,v1]=DATA[Math.min(i+1,DATA.length-1)];const f=x1===x0?0:(yr-x0)/(x1-x0);return{yr,cents:lerp(v0,v1,f)};}
function drawA(prog,alpha,dy){const p=plot();ctx.save();ctx.globalAlpha=alpha;ctx.translate(0,dy);
  ctx.strokeStyle="rgba(95,182,207,.08)";ctx.lineWidth=1;
  for(let gx=p.l;gx<=p.r+1;gx+=(p.r-p.l)/10){ctx.beginPath();ctx.moveTo(gx,p.t-18);ctx.lineTo(gx,p.b);ctx.stroke();}
  for(let gy=p.t;gy<=p.b+1;gy+=(p.b-p.t)/5){ctx.beginPath();ctx.moveTo(p.l,gy);ctx.lineTo(p.r,gy);ctx.stroke();}
  ctx.fillStyle="rgba(155,170,178,.9)";ctx.font="14px 'Noto Sans SC',sans-serif";ctx.textAlign="center";
  for(let yr=2016;yr<=2026;yr+=2)ctx.fillText(yr,xA(yr,p),p.b+22);
  ctx.textAlign="right";for(const c of [8,11,14])ctx.fillText(c+"¢",p.l-10,yA(c,p)+4);   // ¢ 轴（第一版有）
  ctx.lineCap="round";ctx.lineJoin="round";ctx.shadowColor="rgba(224,102,74,.55)";ctx.shadowBlur=16;
  ctx.strokeStyle="#e0664a";ctx.lineWidth=3;ctx.beginPath();
  for(let i=0;i<=120;i++){const d=atA(i/120*prog);i===0?ctx.moveTo(xA(d.yr,p),yA(d.cents,p)):ctx.lineTo(xA(d.yr,p),yA(d.cents,p));}
  ctx.stroke();ctx.shadowBlur=0;const cur=atA(prog),cx=xA(cur.yr,p),cy=yA(cur.cents,p);
  // 曲线下淡填充（第一版有）
  const grad=ctx.createLinearGradient(0,p.t,0,p.b);grad.addColorStop(0,"rgba(224,102,74,.18)");grad.addColorStop(1,"rgba(224,102,74,0)");
  ctx.fillStyle=grad;ctx.beginPath();ctx.moveTo(p.l,p.b);
  for(let i=0;i<=120;i++){const d=atA(i/120*prog);ctx.lineTo(xA(d.yr,p),yA(d.cents,p));}
  ctx.lineTo(cx,p.b);ctx.closePath();ctx.fill();
  ctx.fillStyle="#fff";ctx.shadowColor="#e0664a";ctx.shadowBlur=18;ctx.beginPath();ctx.arc(cx,cy,4,0,7);ctx.fill();ctx.shadowBlur=0;
  // 右上账单标记：保留“虚线从终点延伸出去”的原设计（在终点上方，不压曲线）
  // 左上 +73% 上移，顶部对齐右边标记顶行
  const cyEnd=yA(14.7,p), yTop=cyEnd-90;
  const pct=Math.round((cur.cents-Y0)/Y0*100);const big=Math.max(50,Math.min(78,W*0.052));
  ctx.textAlign="left";ctx.textBaseline="top";
  ctx.fillStyle="#e0664a";ctx.font=`700 ${big}px 'Noto Sans SC',sans-serif`;
  ctx.fillText("+"+pct+"%",p.l,yTop);
  ctx.fillStyle="rgba(150,165,172,.9)";ctx.font="14px 'Noto Sans SC',sans-serif";
  ctx.fillText(cur.cents.toFixed(1)+" ¢/kWh",p.l,yTop+big+2);
  if(prog>0.9){const aa=cl((prog-0.9)/0.1);
    ctx.setLineDash([3,3]);ctx.strokeStyle=`rgba(224,102,74,${aa})`;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx-10,cy-72);ctx.stroke();ctx.setLineDash([]);   // 虚线从终点延伸出去
    ctx.textAlign="right";ctx.textBaseline="alphabetic";
    ctx.fillStyle=`rgba(255,255,255,${aa})`;ctx.font="700 16px 'Noto Sans SC',sans-serif";ctx.fillText("$940.08",cx-14,cy-76);
    ctx.fillStyle=`rgba(205,214,218,${aa})`;ctx.font="13px 'Noto Sans SC',sans-serif";ctx.fillText("2026·2 月 Rebecca 的一张电费单",cx-14,cy-56);
    ctx.fillStyle=`rgba(224,102,74,${aa})`;ctx.font="700 13px 'Noto Sans SC',sans-serif";ctx.fillText("超过她当月全部收入",cx-14,cy-38);}
  ctx.textBaseline="alphabetic";ctx.restore();}
// ===== 图B：新增负荷占比 =====
// 点阵 unit chart：166 格=166 吉瓦，数据中心 90 格金色发光点亮
function drawB(prog,alpha,dy){const p=plot();ctx.save();ctx.globalAlpha=alpha;ctx.translate(0,dy);
  const total=166, cols=21, rows=8, litN=Math.round(90*prog);
  const y0=p.t+54, availH=p.b-y0;
  const cellW=(p.r-p.l)/cols, cellH=availH/rows, s=Math.min(cellW,cellH)*0.6;
  for(let i=0;i<total;i++){const col=i%cols,row=Math.floor(i/cols);
    const x=p.l+col*cellW+(cellW-s)/2, y=y0+row*cellH+(cellH-s)/2;
    if(i<litN){ctx.shadowColor="rgba(210,162,74,.6)";ctx.shadowBlur=9;ctx.fillStyle="#d2a24a";}
    else{ctx.shadowBlur=0;ctx.fillStyle="rgba(200,215,225,.10)";}
    ctx.fillRect(x,y,s,s);}
  ctx.shadowBlur=0;
  const big=Math.max(34,Math.min(54,W*0.038));ctx.textAlign="left";ctx.textBaseline="alphabetic";const bx=p.l+(cellW-s)/2;
  ctx.fillStyle="#d2a24a";ctx.font=`700 ${big}px 'Noto Sans SC',sans-serif`;   // 读数不发光
  ctx.fillText(litN+" / 166 吉瓦",bx,y0-32);   // 对齐点阵第一格左边缘
  ctx.fillStyle="rgba(150,165,172,.9)";ctx.font="14px 'Noto Sans SC',sans-serif";
  ctx.fillText("每格 1 吉瓦 · 亮起的是数据中心新增用电，约占新增的一半",bx,y0-12);
  ctx.restore();}

// 纯位移滑入：opacity 恒为 1，只动 translateY（从最下面滑上来 / 划走滑出顶部）
function setBox(el,ty){el.style.transform=`translateX(-50%) translateY(${ty}px)`;}
function render(){
  requestAnimationFrame(render);
  // 放慢 + 重点停留：图表动画结束后文字不马上走，停一段再划走
  const in1=kf(P,0.00,0.07), out1=kf(P,0.46,0.55);
  setBox(t1, (1-in1)*Hh*0.98 + out1*(-Hh*1.15));   // 滑上来定格 → 停留 → 划走
  const aAlpha=kf(P,0.10,0.16)*(1-kf(P,0.46,0.55));
  const aProg=kf(P,0.16,0.34);                       // 图A动画 0.16~0.34 → 停留到 0.46 → 才划走
  const in2=kf(P,0.59,0.66);
  setBox(t2, (1-in2)*Hh*0.98);
  const bAlpha=kf(P,0.63,0.69);
  const bProg=kf(P,0.71,0.90);                       // 图B动画 0.71~0.90 → 停留到底
  ctx.clearRect(0,0,W,Hh);
  if(aAlpha>0.01) drawA(aProg, aAlpha, (1-aAlpha)*34);
  if(bAlpha>0.01) drawB(bProg, bAlpha, (1-bAlpha)*34);
}
render();
</script>
</body></html>
