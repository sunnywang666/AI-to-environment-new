<!doctype html>
<html lang="zh"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>芯片烧电·水扛热 — 3D 发热阵列（滚动驱动）</title>
<style>
  :root{--ink:#0a1014;--water:#5fb6cf;--ember:#d4502e;--steam:#cfe6ec;--dim:#7d8a90;}
  html,body{margin:0;background:var(--ink);color:#e7eef0;
    font-family:"Noto Sans SC","Microsoft YaHei",sans-serif;}
  /* 滚动轨道：很高，舞台被钉住，动画随滚动逐帧播放 */
  #track{height:460vh;position:relative;}
  #stage{position:sticky;top:0;height:100vh;overflow:hidden;}
  canvas{display:block;}
  /* HUD：左上读数 + 中下旁白，随滚动阶段切换 */
  #hud{position:absolute;inset:0;pointer-events:none;}
  .readout{position:absolute;left:34px;top:30px;font-variant-numeric:tabular-nums;}
  .readout .row{display:flex;align-items:baseline;gap:10px;margin-bottom:6px;}
  .readout .k{font-size:12px;letter-spacing:.14em;color:var(--dim);width:64px;white-space:nowrap;}
  .readout .v{font-weight:900;font-size:30px;line-height:1;}
  .readout .u{font-size:13px;color:var(--dim);}
  #temp .v{color:var(--ember);} #water .v{color:var(--water);}
  #caption{position:absolute;left:50%;bottom:12vh;transform:translateX(-50%);
    max-width:560px;text-align:center;padding:0 24px;}
  #cap-k{font-size:12px;letter-spacing:.3em;color:var(--dim);margin-bottom:10px;}
  #cap-t{font-size:clamp(18px,2.4vw,26px);font-weight:700;line-height:1.5;
    text-shadow:0 2px 20px rgba(0,0,0,.6);transition:opacity .3s;}
  #cap-t b{color:var(--water);font-weight:900;}
  #scrollhint{position:absolute;left:50%;bottom:3vh;transform:translateX(-50%);
    font-size:12px;letter-spacing:.16em;color:var(--dim);animation:bob 2s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(5px)}}
  #note{position:fixed;right:10px;bottom:8px;color:#5fb6cf;opacity:.7;
    font:10px ui-monospace,monospace;background:rgba(10,16,20,.6);padding:2px 7px;border-radius:4px;}
</style></head><body>
<div id="track">
  <div id="stage">
    <div id="hud">
      <div class="readout">
        <div class="row" id="temp"><span class="k">芯片温度</span><span class="v" id="temp-v">22</span><span class="u">°C</span></div>
        <div class="row" id="water"><span class="k">耗冷却水</span><span class="v" id="water-v">0</span><span class="u">毫升 / 这一格</span></div>
      </div>
      <div id="caption"><div id="cap-k">① 进机房 · 扛热</div><div id="cap-t">机房上电前，一排排芯片静静待机。</div></div>
      <div id="scrollhint">↓ 滚动，给它一道指令 ↓</div>
    </div>
  </div>
</div>
<div id="note">Three.js + ScrollTrigger pin/scrub · 按「芯片烧电·水扛热」重设计 · 滚动驱动真渲染</div>

<script src="../js/vendor/three.min.js"></script>
<script src="../js/vendor/gsap.min.js"></script>
<script src="../js/vendor/ScrollTrigger.min.js"></script>
<script>
gsap.registerPlugin(ScrollTrigger);
const stage=document.getElementById('stage');
const W=()=>innerWidth, H=()=>innerHeight;

// ---------- 场景 ----------
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x0a1014, 0.018);
const camera=new THREE.PerspectiveCamera(52, W()/H(), 0.1, 400);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(W(),H());
renderer.setClearColor(0x0a1014,1);
stage.insertBefore(renderer.domElement, document.getElementById('hud'));

scene.add(new THREE.AmbientLight(0x405058, 0.9));
const key=new THREE.DirectionalLight(0xcfe0e6, 0.7); key.position.set(6,12,8); scene.add(key);

// ---------- 芯片阵列 ----------
const N=16, spacing=1.18, geo=new THREE.BoxGeometry(0.92,0.22,0.92);
const COLD=new THREE.Color(0x16323b), HOT=new THREE.Color(0xd4502e);
const chips=[];
const group=new THREE.Group(); scene.add(group);
const cx=(N-1)/2;
for(let x=0;x<N;x++)for(let z=0;z<N;z++){
  const mat=new THREE.MeshStandardMaterial({color:0x0e1c24, emissive:0x16323b, emissiveIntensity:.35, metalness:.3, roughness:.6});
  const m=new THREE.Mesh(geo,mat);
  m.position.set((x-cx)*spacing, 0, (z-cx)*spacing);
  // 细描边，深色底上更利落
  const ed=new THREE.LineSegments(new THREE.EdgesGeometry(geo), new THREE.LineBasicMaterial({color:0x24424c}));
  m.add(ed);
  const d=Math.hypot(x-cx,z-cx)/Math.hypot(cx,cx); // 0中心→1边缘
  chips.push({m,mat,d,baseY:0});
  group.add(m);
}

// ---------- 蒸汽粒子（降温阶段升腾）----------
const STEAM=600, sgeo=new THREE.BufferGeometry(), spos=new Float32Array(STEAM*3), svel=new Float32Array(STEAM);
for(let i=0;i<STEAM;i++){ spos[i*3]=(Math.random()-.5)*N*spacing; spos[i*3+1]=Math.random()*6; spos[i*3+2]=(Math.random()-.5)*N*spacing; svel[i]=.01+Math.random()*.03; }
sgeo.setAttribute('position', new THREE.BufferAttribute(spos,3));
const steam=new THREE.Points(sgeo, new THREE.PointsMaterial({color:0xcfe6ec, size:.14, transparent:true, opacity:0, depthWrite:false}));
scene.add(steam);

// ---------- 滚动进度驱动 ----------
let P=0;
ScrollTrigger.create({ trigger:"#track", start:"top top", end:"bottom bottom", scrub:true,
  onUpdate:self=>{ P=self.progress; } });

const clamp01=v=>v<0?0:v>1?1:v;
const smooth=t=>t*t*(3-2*t);
const lerp=(a,b,t)=>a+(b-a)*t;

// HUD 元素
const tempV=document.getElementById('temp-v'), waterV=document.getElementById('water-v');
const capK=document.getElementById('cap-k'), capT=document.getElementById('cap-t');
const caps=[
  {p:0.00, k:"① 进机房 · 扛热", t:"机房上电前，一排排芯片静静待机。"},
  {p:0.24, k:"烧电 · 升温", t:"你按下发送的那一刻，芯片开始<b>烧电运算</b>，热从中心涌出来。"},
  {p:0.52, k:"水扛热 · 汽化降温", t:"清洁淡水被泵上来，<b>汽化</b>带走热量——七到八成就这样升上天空。"},
  {p:0.80, k:"而这，每天 25 亿次", t:"你看到的只是<b>其中一格</b>。把它乘以全球每天的提问量。"},
];
let lastCap=-1;

function setCap(){ let idx=0; for(let i=0;i<caps.length;i++){ if(P>=caps[i].p) idx=i; }
  if(idx!==lastCap){ lastCap=idx; capT.style.opacity=0;
    setTimeout(()=>{ capK.textContent=caps[idx].k; capT.innerHTML=caps[idx].t; capT.style.opacity=1; }, 180); } }

function animate(){
  requestAnimationFrame(animate);
  group.rotation.y = Math.sin(P*0.6)*0.05 + 0.0006*performance.now()*0; // 极轻微
  // 相机：低角度推进 → 拉远露出全阵列
  const camP = smooth(clamp01((P-0.74)/0.26)); // 最后阶段拉远
  const r = lerp(13, 30, camP), hgt = lerp(7.5, 22, camP);
  const ang = lerp(0.0, 0.5, camP);
  camera.position.set(Math.sin(ang)*r, hgt, Math.cos(ang)*r);
  camera.lookAt(0,0,0);

  // 每格：升温（中心先）→ 降温（中心先回落）
  let maxHeat=0;
  for(const c of chips){
    const onP   = smooth(clamp01((P - 0.16 - c.d*0.14)/0.26));   // 0→1 升温，中心先
    const coolP = smooth(clamp01((P - 0.50 - c.d*0.14)/0.26));   // 0→1 降温，中心先
    const heat = onP*(1-coolP);
    c.mat.emissive.copy(COLD).lerp(HOT, heat);
    c.mat.emissiveIntensity = 0.3 + heat*1.5;
    c.m.position.y = heat*0.18;                                   // 受热微微抬升
    if(heat>maxHeat) maxHeat=heat;
  }
  // 蒸汽：降温阶段出现并升腾
  const coolGlobal = smooth(clamp01((P-0.48)/0.22)) * (1-smooth(clamp01((P-0.82)/0.18)));
  steam.material.opacity = coolGlobal*0.5;
  const pos=steam.geometry.attributes.position.array;
  for(let i=0;i<STEAM;i++){ pos[i*3+1]+=svel[i]*(0.4+coolGlobal); if(pos[i*3+1]>7){ pos[i*3+1]=0; } }
  steam.geometry.attributes.position.needsUpdate=true;

  // HUD 读数
  const temp = Math.round(lerp(22, 86, smooth(clamp01((P-0.14)/0.34))) - lerp(0,18,smooth(clamp01((P-0.5)/0.3))));
  tempV.textContent = temp;
  waterV.textContent = Math.round(smooth(clamp01((P-0.46)/0.4))*519);
  setCap();
  renderer.render(scene,camera);
}
animate();

addEventListener('resize',()=>{ camera.aspect=W()/H(); camera.updateProjectionMatrix(); renderer.setSize(W(),H()); });
</script>
</body></html>
