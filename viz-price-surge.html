<!doctype html>
<html lang="zh"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>电价飙升 — 滚动驱动科技仪表</title>
<style>
  :root{--bg:#0a0f14;--text:#e7eef0;--dim:#7d8a90;--water:#5fb6cf;--ember:#e0664a;--energy:#d2a24a;
    --mono:ui-monospace,"SF Mono","Consolas",monospace;--sans:"Noto Sans SC","Microsoft YaHei",sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:18px;line-height:1.85;}
  #track{height:400vh;position:relative;}
  #stage{position:sticky;top:0;height:100vh;overflow:hidden;}
  canvas{position:absolute;inset:0;width:100%;height:100%;}
  /* 左上：叙事（黑体·科技风·无卡片） */
  /* 叙事：水平居中、占中间约 3/5（仿 MIT），栏内文字左对齐 */
  #story{position:absolute;left:50%;transform:translateX(-50%);top:9vh;width:60%;max-width:760px;text-align:left;z-index:2;}
  #story .k{font-size:13px;letter-spacing:.3em;color:var(--dim);font-weight:500;margin-bottom:14px}
  #story h1{font-size:20px;font-weight:900;color:#fff;line-height:1.5;margin-bottom:14px}
  #story p{font-size:18px;color:#cdd6da;}
  #story p b{color:#fff;font-weight:700} #story .e{color:var(--ember);font-weight:700}
  /* 右上：数码管读数 */
  #gauge{position:absolute;right:clamp(54px,7vw,96px);top:10vh;text-align:right;z-index:2;}
  #gauge .pct{font-family:var(--mono);font-weight:700;font-size:clamp(40px,5.5vw,72px);line-height:1;
    color:var(--ember);letter-spacing:.02em;text-shadow:0 0 24px rgba(224,102,74,.5);font-variant-numeric:tabular-nums}
  #gauge .cents{font-family:var(--mono);font-size:14px;color:var(--dim);margin-top:8px;letter-spacing:.08em}
  #gauge .yr{font-family:var(--mono);font-size:13px;color:var(--water);margin-top:2px;letter-spacing:.1em}
  #hint{position:absolute;left:50%;bottom:3vh;transform:translateX(-50%);z-index:3;
    font-size:12px;letter-spacing:.16em;color:var(--dim);animation:bob 2s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(5px)}}
  #note{position:fixed;right:10px;bottom:8px;color:var(--water);opacity:.7;font:10px var(--mono);background:rgba(10,15,20,.6);padding:2px 7px;border-radius:4px}
</style></head><body>
<div id="track"><div id="stage">
  <canvas id="c"></canvas>
  <div id="story">
    <div class="k">⑤ 账单</div>
    <h1>电价一路爬，账单压垮普通人</h1>
    <p>过去十年，西弗吉尼亚州居民电价上涨 <span class="e">73%</span>。老旧燃煤、天然气价格、电网维护都在推高成本——<b>数据中心不是唯一原因</b>，但它正成为新增用电里最大的一块。</p>
  </div>
  <div id="hint">↓ 滚动，看十年电价怎么爬 ↓</div>
</div></div>
<div id="note">滚动驱动 · 发光曲线 draw-on · 数码管读数 · 终点=一张真实账单</div>
<script>
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
let DPR=Math.min(devicePixelRatio||1,2), P=0, W=0, Hh=0;
function resize(){W=innerWidth;Hh=innerHeight;cv.width=W*DPR;cv.height=Hh*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
resize(); addEventListener('resize',resize);
addEventListener('scroll',()=>{const t=document.getElementById('track');P=Math.min(1,Math.max(0,scrollY/(t.scrollHeight-innerHeight)));},{passive:true});
const cl=(v,a=0,b=1)=>v<a?a:v>b?b:v, sm=t=>t*t*(3-2*t), lerp=(a,b,t)=>a+(b-a)*t;

// 数据：西弗居民电价 ¢/kWh，十年涨 73%
const DATA=[[2016,8.5],[2018,9.3],[2020,10.4],[2022,11.7],[2024,13.2],[2026,14.7]];
const Y0=DATA[0][1], Y1=DATA[DATA.length-1][1];
// 绘图区
const GUT=()=>Math.max(54,Math.min(96,W*0.07));
function plot(){const g=GUT();return {l:g+34,r:W-g,t:Hh*0.44,b:Hh*0.86};}
const xOf=(yr,p)=>{const f=(yr-2016)/10;return lerp(p.l,p.r,f);};
const yOf=(c,p)=>{const f=(c-7)/(16-7);return lerp(p.b,p.t,f);};
// 沿数据线在 [0,1] 进度处插值
function at(prog){const span=2026-2016, yr=2016+span*prog;
  let i=0; while(i<DATA.length-1 && DATA[i+1][0]<yr) i++;
  const [x0,v0]=DATA[i],[x1,v1]=DATA[Math.min(i+1,DATA.length-1)];
  const f=x1===x0?0:(yr-x0)/(x1-x0); return {yr, cents:lerp(v0,v1,f)};}

function frame(){
  requestAnimationFrame(frame);
  const t=sm(P), p=plot();
  ctx.clearRect(0,0,W,Hh);
  // 网格底（科技感）
  ctx.strokeStyle="rgba(95,182,207,.07)"; ctx.lineWidth=1;
  for(let gx=p.l;gx<=p.r+1;gx+=(p.r-p.l)/10){ctx.beginPath();ctx.moveTo(gx,p.t-20);ctx.lineTo(gx,p.b);ctx.stroke();}
  for(let gy=p.t;gy<=p.b+1;gy+=(p.b-p.t)/5){ctx.beginPath();ctx.moveTo(p.l,gy);ctx.lineTo(p.r,gy);ctx.stroke();}
  // 轴标注
  ctx.fillStyle="rgba(155,170,178,.95)"; ctx.font="14px ui-monospace,monospace"; ctx.textAlign="center";
  for(let yr=2016;yr<=2026;yr+=2) ctx.fillText(yr, xOf(yr,p), p.b+22);
  ctx.textAlign="right";
  for(const c of [8,11,14]) ctx.fillText(c+"¢", p.l-10, yOf(c,p)+4);

  // 曲线（揭示到 progress）
  const prog=t;
  ctx.lineCap="round"; ctx.lineJoin="round";
  ctx.shadowColor="rgba(224,102,74,.55)"; ctx.shadowBlur=16;
  ctx.strokeStyle="#e0664a"; ctx.lineWidth=3;
  ctx.beginPath();
  const steps=120;
  for(let i=0;i<=steps;i++){const pr=i/steps*prog; const d=at(pr); const x=xOf(d.yr,p),y=yOf(d.cents,p);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
  ctx.stroke();
  ctx.shadowBlur=0;
  // 曲线下淡填充
  const cur=at(prog); const cx=xOf(cur.yr,p), cy=yOf(cur.cents,p);
  const grad=ctx.createLinearGradient(0,p.t,0,p.b); grad.addColorStop(0,"rgba(224,102,74,.18)"); grad.addColorStop(1,"rgba(224,102,74,0)");
  ctx.fillStyle=grad; ctx.beginPath(); ctx.moveTo(p.l,p.b);
  for(let i=0;i<=steps;i++){const pr=i/steps*prog;const d=at(pr);ctx.lineTo(xOf(d.yr,p),yOf(d.cents,p));}
  ctx.lineTo(cx,p.b); ctx.closePath(); ctx.fill();
  // 末端光点
  ctx.fillStyle="#fff"; ctx.shadowColor="#e0664a"; ctx.shadowBlur=18; ctx.beginPath(); ctx.arc(cx,cy,4,0,7); ctx.fill(); ctx.shadowBlur=0;

  // 终点账单标记（接近底时点亮）
  if(prog>0.92){const a=cl((prog-0.92)/0.08);
    ctx.strokeStyle=`rgba(224,102,74,${a})`; ctx.lineWidth=1; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx-10, cy-70); ctx.stroke(); ctx.setLineDash([]);
    ctx.textAlign="right"; ctx.fillStyle=`rgba(255,255,255,${a})`; ctx.font="700 15px 'Noto Sans SC'";
    ctx.fillText("$940.08", cx-16, cy-78);
    ctx.fillStyle=`rgba(205,214,218,${a})`; ctx.font="12px 'Noto Sans SC'";
    ctx.fillText("2026·2 月 Rebecca 的一张电费单", cx-16, cy-60);
    ctx.fillStyle=`rgba(224,102,74,${a})`; ctx.font="700 12px 'Noto Sans SC'";
    ctx.fillText("超过她当月全部收入", cx-16, cy-44);
  }

  // 数码读数（画在图左上空白区，科技感）
  const pct=Math.round((cur.cents-Y0)/Y0*100);
  ctx.textAlign="left"; ctx.textBaseline="top";
  const big=Math.max(36,Math.min(60,W*0.042));
  ctx.shadowColor="rgba(224,102,74,.5)"; ctx.shadowBlur=18; ctx.fillStyle="#e0664a";
  ctx.font=`700 ${big}px ui-monospace,monospace`;
  ctx.fillText("+"+pct+"%", p.l+4, p.t+6);
  ctx.shadowBlur=0;
  ctx.fillStyle="rgba(150,165,172,.9)"; ctx.font="14px ui-monospace,monospace";
  ctx.fillText(cur.cents.toFixed(1)+" ¢/kWh · "+Math.round(cur.yr), p.l+6, p.t+6+big+8);
  ctx.textBaseline="alphabetic";
}
frame();
</script>
</body></html>
